<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore Smart</title><script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script><style>
body{margin:0;font-family:sans-serif;transition:0.3s}
body.dark{background:#0e0e0e;color:#fff}
body.light{background:#f5f5f5;color:#111}

.header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #222}
.btn{padding:6px 10px;border:1px solid #333;background:none;border-radius:6px;cursor:pointer;color:inherit}

.container{display:grid;grid-template-columns:260px 1fr 280px;gap:10px;max-width:1300px;margin:auto;padding:10px}
@media(max-width:1000px){.container{grid-template-columns:1fr}.standings{display:none}}

.leagues{display:flex;overflow-x:auto;gap:10px;padding:10px}
.league{padding:6px 10px;border-radius:8px;white-space:nowrap;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;background:#1a1a1a}
body.light .league{background:#ddd}
.league.active{background:#00d25b;color:#000}

#widget{padding:10px;min-height:150px}

.standings{background:#111;border:1px solid #333;border-radius:10px;height:calc(100vh - 80px);overflow:auto}
body.light .standings{background:#fff;border-color:#ddd}
.st-title{padding:10px;border-bottom:1px solid #333;font-weight:700}
.team-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;cursor:pointer}
.team-row img{width:18px;height:18px}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:999}
.modal-content{background:var(--panel,#111);padding:16px;border-radius:10px;width:320px;max-width:90%}
.modal-content img{width:60px;height:60px}
.close{float:right;cursor:pointer;font-size:18px}
</style></head><body class="dark"><div class="header">
  <div>⚽ LiveScore Smart</div>
  <button class="btn" onclick="toggleTheme()">🌙/☀️</button>
</div><div class="leagues" id="leagueList"></div><div class="container">
  <div id="widget"></div>  <div class="standings">
    <div class="st-title">📊 Standings</div>
    <div id="standingsBox">Select a league</div>
  </div>
</div><!-- TEAM MODAL --><div class="modal" id="teamModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="teamInfo">Loading...</div>
  </div>
</div><script>
const API_KEY="1b6cb2f77346c107941c5180d1881f77";
let currentLeague=null;
let theme="dark";
let currentDate=new Date().toISOString().split('T')[0];

const LEAGUES=[
  {id:1,name:"World Cup 2026"},
  {id:39,name:"EPL"},{id:140,name:"La Liga"},{id:78,name:"Bundesliga"},
  {id:135,name:"Serie A"},{id:61,name:"Ligue 1"},{id:848,name:"Conference"},
  {id:288,name:"Betway SA"},{id:197,name:"Greece"},{id:113,name:"Allsvenskan"},
  {id:270,name:"Cyprus"},{id:307,name:"Saudi"}
];

function toggleTheme(){
  theme=(theme==="dark")?"light":"dark";
  document.body.className=theme;
}

function renderLeagues(){
  const box=document.getElementById("leagueList");
  box.innerHTML="";

  LEAGUES.forEach(l=>{
    const d=document.createElement("div");
    d.className="league"+(currentLeague===l.id?" active":"");

    d.innerHTML=`<img src="https://media.api-sports.io/football/leagues/${l.id}.png" style="width:18px;height:18px"> ${l.name}`;

    d.onclick=()=>{
      currentLeague=l.id;
      loadWidget(l.id);
      loadStandings(l.id);
      renderLeagues();
    };

    box.appendChild(d);
  });
}

function loadWidget(id){
  const box=document.getElementById("widget");
  box.innerHTML="";

  const w=document.createElement("api-sports-widget");
  w.setAttribute("data-type","games");
  w.setAttribute("data-date",currentDate);
  w.setAttribute("data-theme",theme);
  if(id) w.setAttribute("data-league",id);

  requestAnimationFrame(()=>box.appendChild(w));
}

async function loadStandings(id){
  const box=document.getElementById("standingsBox");
  box.innerHTML="Loading...";

  const res=await fetch(`https://v3.football.api-sports.io/standings?league=${id}&season=2025`,{
    headers:{"x-apisports-key":API_KEY}
  });

  const data=await res.json();
  const table=data.response?.[0]?.league?.standings?.[0]||[];

  box.innerHTML="";

  table.forEach(t=>{
    const row=document.createElement("div");
    row.className="team-row";

    row.innerHTML=`
      <div>${t.rank}</div>
      <div style="flex:1;display:flex;align-items:center;gap:6px">
        <img src="${t.team.logo}"> ${t.team.name}
      </div>
      <div>${t.points}</div>
    `;

    row.onclick=()=>loadTeam(t.team.id);

    box.appendChild(row);
  });
}

async function loadTeam(id){
  const modal=document.getElementById("teamModal");
  const box=document.getElementById("teamInfo");

  modal.style.display="flex";
  box.innerHTML="Loading...";

  const res=await fetch(`https://v3.football.api-sports.io/teams?id=${id}`,{
    headers:{"x-apisports-key":API_KEY}
  });

  const data=await res.json();
  const team=data.response?.[0]?.team;
  const venue=data.response?.[0]?.venue;

  box.innerHTML=`
    <img src="${team.logo}">
    <h3>${team.name}</h3>
    <p>Country: ${team.country}</p>
    <p>Founded: ${team.founded}</p>
    <p>Venue: ${venue.name}</p>
    <p>City: ${venue.city}</p>
  `;
}

function closeModal(){
  document.getElementById("teamModal").style.display="none";
}

window.onclick=function(e){
  if(e.target.id==="teamModal") closeModal();
}

window.onload=()=>{
  renderLeagues();
  loadWidget(null);
}
</script></body>
</html>
