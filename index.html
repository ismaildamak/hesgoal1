<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore</title>

<script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0e0e0e;
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #222;
}
.title{font-weight:bold}
.btn{
  padding:6px 12px;
  border:1px solid #333;
  background:none;
  color:#fff;
  border-radius:6px;
}

/* LEAGUES */
.leagues{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}
.league{
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  background:#1a1a1a;
  border-radius:8px;
  white-space:nowrap;
  cursor:pointer;
  font-size:13px;
}
.league img{
  width:18px;
  height:18px;
  object-fit:contain;
}
.league.active{
  background:#00d25b;
  color:#000;
}

/* WIDGET */
#widget{
  padding:10px;
  min-height:150px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">⚽ LiveScore</div>
  <button class="btn" onclick="toggleFavMode()">Favorites</button>
</div>

<div class="leagues" id="leagueList"></div>
<div id="widget"></div>

<script>
const LEAGUES = [
  {id:2,name:"UCL"},
  {id:3,name:"UEL"},
  {id:848,name:"Conference"},
  {id:39,name:"EPL"},
  {id:40,name:"Championship"},
  {id:140,name:"La Liga"},
  {id:78,name:"Bundesliga"},
  {id:135,name:"Serie A"},
  {id:61,name:"Ligue 1"},
  {id:88,name:"Eredivisie"},
  {id:94,name:"Portugal"},
  {id:113,name:"Sweden"},
  {id:197,name:"Greece"},
  {id:270,name:"Cyprus"},
  {id:307,name:"Saudi"}
];

let currentLeague = null;
let favMode = false;
let currentDate = new Date().toISOString().split('T')[0];

/* STORAGE SAFE */
function safeStorage(){
  try{
    localStorage.setItem('_t','1');
    localStorage.removeItem('_t');
    return true;
  }catch(e){return false;}
}

function getFavs(){
  if(!safeStorage()) return [];
  try{return JSON.parse(localStorage.getItem('favs'))||[]}catch(e){return [];}
}

function setFavs(favs){
  if(!safeStorage()) return;
  localStorage.setItem('favs', JSON.stringify(favs));
}

/* RENDER */
function renderLeagues(){
  const container = document.getElementById('leagueList');
  container.innerHTML = '';

  const favs = getFavs();
  const list = (favMode && favs.length) ? LEAGUES.filter(l=>favs.includes(l.id)) : LEAGUES;

  list.forEach(lg=>{
    const div = document.createElement('div');
    div.className = 'league' + (lg.id === currentLeague ? ' active':'');

    div.innerHTML = `
      <img src="https://media.api-sports.io/football/leagues/${lg.id}.png" 
           onerror="this.style.opacity=.3">
      ${lg.name}
    `;

    div.onclick = ()=>{
      currentLeague = lg.id;
      loadWidget(lg.id);
      renderLeagues();
    };

    // LONG PRESS (mobile)
    let pressTimer;
    div.addEventListener('touchstart', ()=>{
      pressTimer = setTimeout(()=>toggleFav(lg.id), 500);
    });
    div.addEventListener('touchend', ()=>clearTimeout(pressTimer));

    // DESKTOP RIGHT CLICK
    div.oncontextmenu = (e)=>{
      e.preventDefault();
      toggleFav(lg.id);
    };

    container.appendChild(div);
  });
}

/* FAVORITES */
function toggleFav(id){
  let favs = getFavs();
  const i = favs.indexOf(id);

  if(i === -1) favs.push(id);
  else favs.splice(i,1);

  setFavs(favs);
  renderLeagues();
}

function toggleFavMode(){
  favMode = !favMode;
  renderLeagues();
  loadWidget(currentLeague);
}

/* LOAD WIDGET */
function loadWidget(leagueId){
  const container = document.getElementById('widget');
  container.innerHTML = '';

  const w = document.createElement('api-sports-widget');
  w.setAttribute('data-type','games');
  w.setAttribute('data-date', currentDate);

  if(leagueId){
    w.setAttribute('data-league', leagueId);
  }

  requestAnimationFrame(()=>{
    container.appendChild(w);
  });
}

/* INIT */
window.addEventListener('DOMContentLoaded', ()=>{
  renderLeagues();
  loadWidget(null);
});
</script>

<!-- CONFIG -->
<api-sports-widget
  data-type="config"
  data-sport="football"
  data-key="1b6cb2f77346c107941c5180d1881f77"
  data-theme="dark"
  data-refresh="30"
></api-sports-widget>

</body>
</html>
