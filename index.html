<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore Pro (FlashScore UI Clone)</title><script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script><style>
:root{
  --bg:#0b0b0b;
  --panel:#141414;
  --panel2:#1b1b1b;
  --border:#262626;
  --text:#fff;
  --muted:#8a8a8a;
  --green:#00d25b;
}

body.light{
  --bg:#f4f4f4;
  --panel:#ffffff;
  --panel2:#f0f0f0;
  --border:#ddd;
  --text:#111;
  --muted:#666;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
}

.logo{
  font-weight:800;
  color:var(--green);
}

.btn{
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:10px;
  max-width:1200px;
  margin:auto;
  padding:10px;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr}
}

/* LEFT SIDEBAR */
.sidebar{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  height:calc(100vh - 70px);
  overflow:auto;
  position:sticky;
  top:60px;
}

.league{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

.league:hover{background:var(--panel2)}

.league.active{
  background:rgba(0,210,91,0.15);
  border-left:3px solid var(--green);
}

.league img{
  width:18px;
  height:18px;
}

/* MAIN AREA */
.main{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}

.headerbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid var(--border);
}

.filters{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.chip{
  padding:5px 8px;
  border:1px solid var(--border);
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

.chip.active{
  background:var(--green);
  color:#000;
  border-color:var(--green);
}

#widget{
  padding:10px;
}

</style></head><body class="dark"><div class="topbar">
  <div class="logo">FLASH LIVE</div>
  <div>
    <button class="btn" onclick="toggleTheme()">🌙/☀️</button>
  </div>
</div><div class="container">  <!-- SIDEBAR -->  <div class="sidebar" id="leagueList"></div>  <!-- MAIN -->  <div class="main"><div class="headerbar">
  <div class="filters">
    <div class="chip active">Today</div>
    <div class="chip">Live</div>
    <div class="chip">Finished</div>
  </div>
</div>

<div id="widget"></div>

  </div></div><script>
const LEAGUES=[
  {id:2,name:"UCL"},{id:39,name:"EPL"},{id:140,name:"La Liga"},
  {id:78,name:"Bundesliga"},{id:135,name:"Serie A"},{id:61,name:"Ligue 1"},
  {id:197,name:"Greece"},{id:270,name:"Cyprus"},{id:288,name:"Betway SA"},
  {id:307,name:"Saudi"}
];

let currentLeague=null;
let theme="dark";
let date=new Date().toISOString().split('T')[0];

function toggleTheme(){
  theme=(theme==="dark")?"light":"dark";
  document.body.className=theme;
  loadWidget(currentLeague);
}

function renderLeagues(){
  const c=document.getElementById("leagueList");
  c.innerHTML="";

  LEAGUES.forEach(l=>{
    const d=document.createElement("div");
    d.className="league"+(currentLeague===l.id?" active":"");

    d.innerHTML=`
      <img src="https://media.api-sports.io/football/leagues/${l.id}.png">
      ${l.name}
    `;

    d.onclick=()=>{
      currentLeague=l.id;
      loadWidget(l.id);
      renderLeagues();
    };

    c.appendChild(d);
  });
}

function loadWidget(id){
  const w=document.getElementById("widget");
  w.innerHTML="";

  const el=document.createElement("api-sports-widget");
  el.setAttribute("data-type","games");
  el.setAttribute("data-date",date);
  el.setAttribute("data-theme",theme);

  if(id) el.setAttribute("data-league",id);

  requestAnimationFrame(()=>w.appendChild(el));
}

window.onload=()=>{
  document.body.className="dark";
  renderLeagues();
  loadWidget(null);
};
</script><api-sports-widget data-type="config" data-sport="football" data-key="1b6cb2f77346c107941c5180d1881f77" data-theme="dark" data-refresh="30" data-show-logos="true"

> </api-sports-widget>

</body>
</html>
