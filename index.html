<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore Smart</title>

<script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:0.3s;
}

/* THEMES */
body.dark{
  background:#0e0e0e;
  color:#fff;
}
body.light{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #222;
}

.btn{
  padding:6px 10px;
  border:1px solid #333;
  background:none;
  border-radius:6px;
  cursor:pointer;
}

/* LEAGUES */
.leagues{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.league{
  padding:6px 10px;
  border-radius:8px;
  white-space:nowrap;
  cursor:pointer;
  font-size:13px;
  display:flex;
  align-items:center;
  gap:6px;
  background:#1a1a1a;
}

body.light .league{
  background:#ddd;
}

.league.active{
  background:#00d25b;
  color:#000;
}

/* WIDGET */
#widget{
  padding:10px;
  min-height:150px;
}
</style>
</head>

<body class="dark">

<div class="header">
  <div>⚽ LiveScore Smart</div>
  <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
</div>

<div class="leagues" id="leagueList"></div>
<div id="widget"></div>

<script>
/* SMART LEAGUES WITH WEIGHTS */
const LEAGUES = [
  {id:2,name:"UCL",weight:99},
  {id:39,name:"EPL",weight:100},
  {id:140,name:"La Liga",weight:95},

  {id:78,name:"Bundesliga",weight:88},
  {id:135,name:"Serie A",weight:90},
  {id:61,name:"Ligue 1",weight:85},

  {id:848,name:"Conference",weight:80},

  // 🇿🇦 Betway Premiership (South Africa)
  {id:288,name:"Betway SA",weight:65},

  {id:197,name:"Greece",weight:60},
  {id:270,name:"Cyprus",weight:55},

  {id:307,name:"Saudi",weight:75}
];

let currentLeague = null;
let currentTheme = "dark";
let currentDate = new Date().toISOString().split('T')[0];

/* STORAGE */
function safeStorage(){
  try{
    localStorage.setItem('_t','1');
    localStorage.removeItem('_t');
    return true;
  }catch(e){return false;}
}

function getFavs(){
  if(!safeStorage()) return [];
  try{return JSON.parse(localStorage.getItem('favs'))||[]}catch(e){return [];}
}

function setFavs(favs){
  if(!safeStorage()) return;
  localStorage.setItem('favs', JSON.stringify(favs));
}

/* SMART SORT */
function sortLeagues(list){
  const favs = getFavs();

  return [...list].sort((a,b)=>{
    const aFav = favs.includes(a.id) ? 1000 : 0;
    const bFav = favs.includes(b.id) ? 1000 : 0;

    return (bFav + b.weight) - (aFav + a.weight);
  });
}

/* THEME */
function toggleTheme(){
  currentTheme = (currentTheme === "dark") ? "light" : "dark";
  document.body.className = currentTheme;

  document.getElementById("themeBtn").innerText =
    currentTheme === "dark" ? "🌙 Dark" : "☀️ Light";

  loadWidget(currentLeague);
}

/* RENDER LEAGUES */
function renderLeagues(){
  const container = document.getElementById('leagueList');
  container.innerHTML = '';

  const list = sortLeagues(LEAGUES);

  list.forEach(lg=>{
    const div = document.createElement('div');
    div.className = 'league' + (lg.id === currentLeague ? ' active':'');

    div.innerHTML = `
      <img src="https://media.api-sports.io/football/leagues/${lg.id}.png"
      style="width:18px;height:18px" onerror="this.style.opacity=.3">
      ${lg.name}
    `;

    div.onclick = ()=>{
      currentLeague = lg.id;
      loadWidget(lg.id);
      renderLeagues();
    };

    container.appendChild(div);
  });
}

/* LOAD WIDGET */
function loadWidget(leagueId){
  const container = document.getElementById('widget');
  container.innerHTML = '';

  const w = document.createElement('api-sports-widget');
  w.setAttribute('data-type','games');
  w.setAttribute('data-date', currentDate);
  w.setAttribute('data-theme', currentTheme);

  if(leagueId){
    w.setAttribute('data-league', leagueId);
  }

  requestAnimationFrame(()=>{
    container.appendChild(w);
  });
}

/* INIT */
window.addEventListener('DOMContentLoaded', ()=>{
  document.body.className = "dark";
  renderLeagues();
  loadWidget(null);
});
</script>

<!-- CONFIG -->
<api-sports-widget
  data-type="config"
  data-sport="football"
  data-key="1b6cb2f77346c107941c5180d1881f77"
  data-theme="dark"
  data-refresh="30"
  data-show-logos="true"
></api-sports-widget>

</body>
</html>
