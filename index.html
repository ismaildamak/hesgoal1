<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveScore</title>

<script type="module" src="https://widgets.api-sports.io/3.1.0/widgets.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  transition:0.3s;
}

/* THEMES */
body.dark{
  background:#0e0e0e;
  color:#fff;
}

body.light{
  background:#f5f5f5;
  color:#111;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  border-bottom:1px solid #222;
}

.btn{
  padding:6px 10px;
  border:1px solid #333;
  background:none;
  border-radius:6px;
  cursor:pointer;
}

/* LEAGUES */
.leagues{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.league{
  padding:6px 10px;
  background:#1a1a1a;
  border-radius:8px;
  white-space:nowrap;
  cursor:pointer;
  font-size:13px;
}

body.light .league{
  background:#ddd;
  color:#111;
}

.league.active{
  background:#00d25b;
  color:#000;
}

/* WIDGET */
#widget{
  padding:10px;
  min-height:150px;
}
</style>
</head>

<body class="dark">

<div class="header">
  <div>⚽ LiveScore</div>

  <div>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>
</div>

<div class="leagues" id="leagueList"></div>
<div id="widget"></div>

<script>
const LEAGUES = [
  {id:39,name:"EPL"},
  {id:140,name:"La Liga"},
  {id:135,name:"Serie A"},
  {id:61,name:"Ligue 1"},
  {id:197,name:"Greece"},
  {id:270,name:"Cyprus"},
  {id:307,name:"Saudi"}
];

let currentLeague = null;
let currentTheme = "dark";
let currentDate = new Date().toISOString().split('T')[0];

/* THEME TOGGLE */
function toggleTheme(){
  currentTheme = (currentTheme === "dark") ? "light" : "dark";
  document.body.className = currentTheme;

  document.getElementById("themeBtn").innerText =
    currentTheme === "dark" ? "🌙 Dark" : "☀️ Light";

  loadWidget(currentLeague);
}

/* RENDER LEAGUES */
function renderLeagues(){
  const container = document.getElementById('leagueList');
  container.innerHTML = '';

  LEAGUES.forEach(lg=>{
    const div = document.createElement('div');
    div.className = 'league' + (lg.id === currentLeague ? ' active':'');

    div.innerHTML = lg.name;

    div.onclick = ()=>{
      currentLeague = lg.id;
      loadWidget(lg.id);
      renderLeagues();
    };

    container.appendChild(div);
  });
}

/* LOAD WIDGET */
function loadWidget(leagueId){
  const container = document.getElementById('widget');
  container.innerHTML = '';

  const w = document.createElement('api-sports-widget');
  w.setAttribute('data-type','games');
  w.setAttribute('data-date', currentDate);
  w.setAttribute('data-theme', currentTheme);

  if(leagueId){
    w.setAttribute('data-league', leagueId);
  }

  requestAnimationFrame(()=>{
    container.appendChild(w);
  });
}

/* INIT */
window.addEventListener('DOMContentLoaded', ()=>{
  document.body.className = "dark";
  renderLeagues();
  loadWidget(null);
});
</script>

<!-- CONFIG -->
<api-sports-widget
  data-type="config"
  data-sport="football"
  data-key="1b6cb2f77346c107941c5180d1881f77"
  data-theme="dark"
  data-refresh="30"
  data-show-logos="true"
></api-sports-widget>

</body>
</html>
